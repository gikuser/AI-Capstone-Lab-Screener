services:
  agentic-screener:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-resume-screener:latest
    container_name: ai-resume-screener
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped
